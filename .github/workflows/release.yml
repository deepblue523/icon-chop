# Build both release packages and create a GitHub Release when a version tag (v*) is pushed.
# Version is taken from the tag (e.g. v1.0.1 -> 1.0.1).

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write  # create release and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: |
          $tag = "$env:GITHUB_REF_NAME"
          $version = $tag.TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish framework-dependent
        run: |
          New-Item -ItemType Directory -Path release -Force
          dotnet publish IconChop.csproj -c Release -o publish `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -p:AssemblyVersion=${{ steps.version.outputs.VERSION }}.0
          Compress-Archive -Path publish\* -DestinationPath release\IconChop-${{ steps.version.outputs.VERSION }}.zip -Force

      - name: Publish self-contained
        run: |
          dotnet publish IconChop.csproj -c Release -r win-x64 --self-contained true -o publish-sc `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -p:AssemblyVersion=${{ steps.version.outputs.VERSION }}.0 `
            -p:SatelliteResourceLanguages=en-US
          Compress-Archive -Path publish-sc\* -DestinationPath release\IconChop-${{ steps.version.outputs.VERSION }}-self-contained.zip -Force

      - name: Build MSI
        run: |
          $publishPath = (Resolve-Path publish-sc).Path
          dotnet build IconChop.Setup.wixproj -c Release `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -p:PublishPath=$publishPath `
            -p:SuppressValidation=true
          $msi = Get-ChildItem -Path bin -Recurse -Filter IconChop.Setup.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $msi) { throw "IconChop.Setup.msi not found under bin\" }
          Copy-Item $msi.FullName release\IconChop-${{ steps.version.outputs.VERSION }}.msi -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: IconChop ${{ steps.version.outputs.VERSION }}
          draft: false
          files: |
            release/IconChop-${{ steps.version.outputs.VERSION }}.zip
            release/IconChop-${{ steps.version.outputs.VERSION }}-self-contained.zip
            release/IconChop-${{ steps.version.outputs.VERSION }}.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
